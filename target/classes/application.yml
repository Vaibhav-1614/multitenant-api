spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/multitenant}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: ${SERVER_PORT:8080}

app:
  jwt:
    secret: ${JWT_SECRET:VGhpc0lzQVN1cGVyU2VjdXJlQmFzZTY0S2V5VGhhdElzQXRMZWFzdDMyQnl0ZXNMb25n}
    expiration-ms: ${JWT_EXPIRATION_MS:3600000}
